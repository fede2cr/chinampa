# Chinampa CLI configuration.
#
# `domain` is the host used to build the URL written onto each NFC tag; the
# 8-char tag ID is appended (https://<domain>/<id>). Override per-invocation
# with `--base-url`, or point at a different file with `--config`.
domain = "chinampa.co.cr"

# Currency code used to display tag prices in the web app (default: CRC).
currency = "CRC"
