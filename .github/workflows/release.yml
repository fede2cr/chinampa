name: release

# Publish the `chnm` CLI only when a version tag like v0.1.0 is pushed.
# The released version is taken from the tag (the Cargo manifests carry a
# 0.0.0 placeholder that is rewritten here), so it is never hardcoded.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  BIN: chnm
  # Linker used for the linux/arm64 cross build (harmless for other targets).
  CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            apt: gcc-aarch64-linux-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker
        if: matrix.apt != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt }}

      - name: Inject release version from tag
        shell: bash
        run: |
          sed -i.bak "s/^version = \"0.0.0\"/version = \"${VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak
          grep '^version' Cargo.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p chnm-cli

      - name: Package
        id: package
        shell: bash
        run: |
          dist="chnm-v${VERSION}-${{ matrix.target }}"
          mkdir "$dist"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp "target/${{ matrix.target }}/release/${BIN}.exe" "$dist/"
            archive="${dist}.zip"
            7z a "$archive" "$dist" >/dev/null
          else
            cp "target/${{ matrix.target }}/release/${BIN}" "$dist/"
            archive="${dist}.tar.gz"
            tar czf "$archive" "$dist"
          fi
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive }}
          fail_on_unmatched_files: true
