name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      # 1. Turn every tags/*.md into data/*.json (copied into dist/data at build).
      - name: Export tag data
        run: cargo run -p chnm-cli -- export --out crates/chnm-web/data

      # 2. Build the static Leptos bundle (public/ and data/ are copied into dist/).
      - name: Build site
        run: cd crates/chnm-web && trunk build --release

      # 3. SPA fallback so deep links work on Pages.
      - name: SPA 404 fallback
        run: cp crates/chnm-web/dist/index.html crates/chnm-web/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: crates/chnm-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
