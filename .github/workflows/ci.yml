name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      # Validate every tag file (ids unique/valid, linked tags resolve).
      - name: Validate tags
        run: cargo run -p chnm-cli -- validate

      - name: Unit tests
        run: cargo test --workspace

      # Smoke-build the web app so broken UI never reaches main.
      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest
      - name: Build web
        run: |
          cargo run -p chnm-cli -- export --out crates/chnm-web/data
          cd crates/chnm-web && trunk build
